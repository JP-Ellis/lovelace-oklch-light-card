---
# PR-based release process.
#
# Stage 1 — Prepare (push to main):
#   `prepare` runs `scripts/release.ts prepare`, which uses git-cliff to compute
#   the next semver from conventional commits, writes package.json + CHANGELOG.md,
#   and force-pushes them to the fixed `release` branch, creating or updating a
#   *draft* release PR. Draft PRs skip the normal CI (see test.yml).
#
# Stage 2 — Verify (release PR marked ready for review):
#   Marking the PR ready runs the normal CI (test.yml) plus the `verify` job
#   here, which builds the bundle and runs a release dry-run. The PR's
#   package.json + CHANGELOG.md are the source of truth — edit them on the PR and
#   the edits are baked into the release.
#
# Stage 3 — Tag (release PR merged):
#   `tag` runs `scripts/release.ts tag`, reading the version from package.json
#   and pushing a `vX.Y.Z` tag.
#
# Stage 4 — Release (tag pushed):
#   `release` builds the bundle and publishes a GitHub Release with the changelog
#   entry and the card asset.
name: Release

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}

jobs:
  complete:
    name: Release completion check
    if: always()
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
      - tag
      - release
    steps:
      - name: Failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  prepare:
    name: Update release PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # git-cliff needs full history to determine the next version.
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq '.id')+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      - name: Update release PR
        # Use the App token so the PR can itself trigger workflows.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: mise run release:prepare

  verify:
    name: Release dry-run
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.ref == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      - name: Install dependencies
        run: aube install --frozen-lockfile

      - name: Build
        run: mise run build

      - name: Verify artifact
        run: test -f dist/oklch-light-card.js

      - name: Release dry-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: mise run release:tag -- --dry-run

  tag:
    name: Create release tag
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq '.id')+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      - name: Create and push release tag
        # Use the App token so the tag can itself trigger this workflow.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: mise run release:tag

  release:
    name: Build and publish release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      - name: Install dependencies
        run: aube install --frozen-lockfile

      - name: Build
        run: mise run build

      - name: Verify artifact
        run: test -f dist/oklch-light-card.js

      - name: Extract changelog entry
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="[$version]" '
            /^## / { if (found) exit; if (index($0, ver)) found=1; next }
            found { print }
          ' CHANGELOG.md > "${RUNNER_TEMP}/release-notes.md"
          if [ ! -s "${RUNNER_TEMP}/release-notes.md" ]; then
            printf '> [!WARNING]\n>\n> No changelog entry found for %s.\n' "$version" \
              > "${RUNNER_TEMP}/release-notes.md"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          files: |-
            dist/oklch-light-card.js
          draft: false
          prerelease: false
